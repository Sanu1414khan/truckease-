<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin • Live Code Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #0a0c14; color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00f3ff; margin-bottom: 20px; }
        .button-group { display: flex; gap: 20px; margin-bottom: 30px; }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            background: #00f3ff;
            color: #0a0c14;
            box-shadow: 0 0 20px #00f3ff;
            font-size: 16px;
        }
        .btn.secondary { background: transparent; border: 1px solid #00f3ff; color: #00f3ff; box-shadow: none; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background: #1a1e2a;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid #00f3ff;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h2 { color: #00f3ff; }
        .close {
            font-size: 30px;
            cursor: pointer;
            color: #aaa;
        }
        textarea {
            width: 100%;
            flex: 1;
            background: #0f121c;
            color: #fff;
            border: 1px solid #00f3ff;
            border-radius: 16px;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            resize: none;
        }
        .modal-footer {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Live Code Editor</h1>
        <div class="button-group">
            <button class="btn" onclick="openEditor('customer')">✏️ Edit Customer App</button>
            <button class="btn" onclick="openEditor('driver')">✏️ Edit Driver App</button>
        </div>
        <p style="color:#ccc;">Changes will be saved to Firebase and apps will update instantly.</p>
    </div>

    <!-- Editor Modal -->
    <div id="editorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Edit Customer App</h2>
                <span class="close" onclick="closeEditor()">&times;</span>
            </div>
            <textarea id="codeEditor" placeholder="Loading code..."></textarea>
            <div class="modal-footer">
                <button class="btn secondary" onclick="closeEditor()">Cancel</button>
                <button class="btn" onclick="confirmSave()">💾 Update & Save</button>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirmModal" class="modal">
        <div class="modal-content" style="max-width:400px; height:auto;">
            <div class="modal-header">
                <h2>Confirm Update</h2>
                <span class="close" onclick="closeConfirm()">&times;</span>
            </div>
            <p style="margin:20px 0;">Are you sure you want to save these changes? The app will update immediately.</p>
            <div class="modal-footer">
                <button class="btn secondary" onclick="closeConfirm()">Cancel</button>
                <button class="btn" onclick="saveCode()">Yes, Save</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByh4tT4zcUpjjQ_ebaYzpSulGtsDHjbw0",
            authDomain: "truckease-cb961.firebaseapp.com",
            projectId: "truckease-cb961",
            storageBucket: "truckease-cb961.firebasestorage.app",
            messagingSenderId: "558046020925",
            appId: "1:558046020925:web:573533af4bbf93841e3154"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentApp = 'customer';
        let pendingCode = '';

        async function openEditor(app) {
            currentApp = app;
            document.getElementById('modalTitle').innerText = app === 'customer' ? 'Edit Customer App' : 'Edit Driver App';
            document.getElementById('editorModal').classList.add('active');
            document.getElementById('codeEditor').value = 'Loading...';
            
            try {
                const doc = await db.collection('app_code').doc(app).get();
                if (doc.exists) {
                    document.getElementById('codeEditor').value = doc.data().code;
                } else {
                    // Default code if none exists
                    document.getElementById('codeEditor').value = `<!-- No code found. Enter your HTML here -->
<!DOCTYPE html>
<html>
<head>
    <title>${app === 'customer' ? 'Customer' : 'Driver'} App</title>
</head>
<body>
    <h1>Hello World</h1>
</body>
</html>`;
                }
            } catch (e) {
                alert('Error loading code: ' + e.message);
            }
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('active');
        }

        function confirmSave() {
            pendingCode = document.getElementById('codeEditor').value;
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeConfirm() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        async function saveCode() {
            closeConfirm();
            closeEditor();
            document.body.style.cursor = 'wait';
            try {
                await db.collection('app_code').doc(currentApp).set({ code: pendingCode });
                alert('✅ Code saved successfully! The app will now show the updated version.');
            } catch (e) {
                alert('Error saving: ' + e.message);
            } finally {
                document.body.style.cursor = 'default';
            }
        }
    </script>
</body>
</html>
